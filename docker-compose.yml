version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    depends_on:
      - postgres

  postgres:

    image: postgres:16

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: creditflow

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
